<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Tree</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="topbar-left">
        <button id="menu-toggle" class="icon-btn" aria-label="Toggle sidebar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <h1 class="logo">🌳 Family Tree</h1>
      </div>
      <div class="topbar-right">
        <div class="search-box">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search" placeholder="Search family members..." autocomplete="off"
                 role="combobox" aria-expanded="false" aria-autocomplete="list" aria-controls="search-results">
          <div id="search-results" class="search-results hidden" role="listbox"></div>
        </div>
        <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme">
          <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="main-layout">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-section">
          <h3>Generations</h3>
          <div id="generation-filter" class="filter-group">
            <label class="checkbox"><input type="checkbox" value="0" checked> Gen 1 (Patriarchs)</label>
            <label class="checkbox"><input type="checkbox" value="1" checked> Gen 2 (Children)</label>
            <label class="checkbox"><input type="checkbox" value="2" checked> Gen 3 (Grandchildren)</label>
            <label class="checkbox"><input type="checkbox" value="3" checked> Gen 4 (Great-grandchildren)</label>
          </div>
        </div>
        <div class="sidebar-section">
          <h3>View</h3>
          <div class="filter-group">
            <button class="btn btn-secondary" id="fit-to-screen">Fit to Screen</button>
            <button class="btn btn-secondary" id="zoom-in">Zoom In</button>
            <button class="btn btn-secondary" id="zoom-out">Zoom Out</button>
          </div>
        </div>
        <div class="sidebar-section">
          <h3>Stats</h3>
          <div id="stats" class="stats"></div>
        </div>
      </aside>

      <main class="tree-container">
        <nav id="breadcrumbs" class="breadcrumbs" aria-label="Navigation trail"></nav>
        <div id="tree" class="f3"></div>
        <div id="loading" class="loading">
          <div class="spinner"></div>
          <p>Loading family tree...</p>
        </div>
      </main>
    </div>

    <!-- Person detail panel -->
    <div id="detail-panel" class="detail-panel hidden">
      <button class="detail-close" id="detail-close">&times;</button>
      <div id="detail-content"></div>
    </div>
  </div>

  <script src="/config.js"></script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
